<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放器</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a2e;
            --accent: #e94560;
            --text: #e0e0e0;
            --text-secondary: #a0a0b0;
            --progress-bg: #2a2a3e;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(233, 68, 96, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(83, 127, 231, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(233, 68, 96, 0.04) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 12s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        /* 主容器 */
        .video-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition);
        }

        .video-container:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        }

        /* 视频播放区域 */
        .video-wrapper {
            position: relative;
            background: #000;
            cursor: pointer;
            line-height: 0;
        }

        video {
            display: block;
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            outline: none;
        }

        /* 中央播放按钮（暂停时显示） */
        .center-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 72px;
            height: 72px;
            background: rgba(233, 68, 96, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                opacity 0.3s ease;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 4px 24px rgba(233, 68, 96, 0.5);
        }

        .center-play-btn.visible {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .center-play-btn:hover {
            background: rgba(233, 68, 96, 1);
            transform: translate(-50%, -50%) scale(1.08);
            box-shadow: 0 6px 32px rgba(233, 68, 96, 0.7);
        }

        .center-play-btn svg {
            width: 30px;
            height: 30px;
            fill: #fff;
            margin-left: 4px;
        }

        /* 底部控制栏 */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(13, 13, 20, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* 进度条区域 */
        .progress-container {
            flex: 1 1 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }

        .progress-bar-wrapper {
            flex: 1;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            transition: height var(--transition);
        }

        .progress-bar-wrapper:hover {
            height: 10px;
            border-radius: 5px;
        }

        .progress-bar-wrapper:hover .progress-thumb {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .progress-filled {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #f0677c);
            border-radius: inherit;
            position: relative;
            transition: width 0.1s linear;
            width: 0%;
        }

        .progress-thumb {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translate(50%, -50%) scale(0);
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity var(--transition), transform var(--transition);
            pointer-events: none;
        }

        .time-display {
            font-size: 0.82rem;
            color: var(--text-secondary);
            white-space: nowrap;
            min-width: 85px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
            letter-spacing: 0.5px;
        }

        /* 按钮样式 */
        .btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text);
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .btn:active {
            background: rgba(255, 255, 255, 0.14);
            transform: scale(0.94);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform var(--transition);
        }

        .btn-play svg {
            width: 22px;
            height: 22px;
        }

        /* 音量滑块 */
        .volume-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 0;
            overflow: hidden;
            height: 4px;
            background: var(--progress-bg);
            border-radius: 2px;
            cursor: pointer;
            transition: width var(--transition), opacity var(--transition);
            opacity: 0;
            outline: none;
        }

        .volume-group:hover .volume-slider,
        .volume-slider:focus-within {
            width: 80px;
            opacity: 1;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        /* 速度选择 */
        .speed-select {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text);
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 0.78rem;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition);
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .speed-select:hover {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.05);
        }
        .speed-select option {
            background: #1a1a2e;
            color: #e0e0e0;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .controls {
                gap: 8px;
                padding: 10px 12px;
            }
            .btn {
                padding: 6px;
            }
            .btn svg {
                width: 17px;
                height: 17px;
            }
            .btn-play svg {
                width: 19px;
                height: 19px;
            }
            .time-display {
                font-size: 0.72rem;
                min-width: 70px;
            }
            .speed-select {
                font-size: 0.7rem;
                padding: 4px 6px;
            }
            .center-play-btn {
                width: 54px;
                height: 54px;
            }
            .center-play-btn svg {
                width: 22px;
                height: 22px;
            }
            .volume-group:hover .volume-slider {
                width: 60px;
            }
        }

        @media (max-width: 400px) {
            .controls {
                gap: 4px;
                padding: 8px 8px;
            }
            .time-display {
                font-size: 0.68rem;
                min-width: 58px;
            }
            .btn {
                padding: 4px;
            }
            .btn svg {
                width: 15px;
                height: 15px;
            }
            .btn-play svg {
                width: 17px;
                height: 17px;
            }
            .speed-select {
                font-size: 0.65rem;
                padding: 3px 4px;
            }
            .volume-group:hover .volume-slider {
                width: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <!-- 视频播放区域 -->
        <div class="video-wrapper" id="videoWrapper">
            <video
            id="videoPlayer"
            src="test.mp4"
            preload="metadata"
            playsinline
            webkit-playsinline
            x5-video-player-type="h5"
            x5-video-orientation="landscape"
        ></video>
        <!-- 中央播放按钮 -->
        <button class="center-play-btn" id="centerPlayBtn" title="播放" aria-label="播放视频">
            <svg viewBox="0 0 24 24">
                <polygon points="6,3 20,12 6,21"/>
            </svg>
        </button>
    </div>

    <!-- 控制栏 -->
    <div class="controls" id="controls">
        <!-- 播放/暂停 -->
        <button class="btn btn-play" id="playPauseBtn" title="播放 / 暂停" aria-label="播放或暂停">
            <svg id="playIcon" viewBox="0 0 24 24">
                <polygon points="6,3 20,12 6,21"/>
            </svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;">
                <rect x="5" y="3" width="5" height="18" rx="1"/>
                <rect x="14" y="3" width="5" height="18" rx="1"/>
            </svg>
        </button>

        <!-- 进度条 -->
        <div class="progress-container">
            <span class="time-display" id="currentTime">0:00</span>
            <div class="progress-bar-wrapper" id="progressBarWrapper">
                <div class="progress-filled" id="progressFilled">
                    <div class="progress-thumb"></div>
                </div>
            </div>
            <span class="time-display" id="duration">0:00</span>
        </div>

        <!-- 音量 -->
        <div class="volume-group">
            <button class="btn" id="muteBtn" title="静音 / 取消静音" aria-label="静音切换">
                <svg id="volumeIcon" viewBox="0 0 24 24">
                    <polygon points="12,3 7,8 2,8 2,16 7,16 12,21"/>
                    <rect x="16" y="8" width="2" height="8" rx="1" opacity="0.7"/>
                    <rect x="19" y="5" width="2" height="14" rx="1" opacity="0.4"/>
                </svg>
                <svg id="muteIcon" viewBox="0 0 24 24" style="display:none;">
                    <polygon points="12,3 7,8 2,8 2,16 7,16 12,21"/>
                    <line x1="20" y1="6" x2="15" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="15" y1="6" x2="20" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1" title="音量" aria-label="音量调节">
        </div>

        <!-- 播放速度 -->
        <select class="speed-select" id="speedSelect" title="播放速度" aria-label="播放速度">
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
        </select>

        <!-- 全屏 -->
        <button class="btn" id="fullscreenBtn" title="全屏" aria-label="全屏切换">
            <svg id="fullscreenIcon" viewBox="0 0 24 24">
                <polyline points="8,3 3,3 3,8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="16,3 21,3 21,8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="21,16 21,21 16,21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="3,16 3,21 8,21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg id="exitFullscreenIcon" viewBox="0 0 24 24" style="display:none;">
                <polyline points="4,8 8,8 8,4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="20,8 16,8 16,4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="20,16 16,16 16,20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="4,16 8,16 8,20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>
</div>

<script>
    (function() {
        // ============ DOM 元素 ============
        const video = document.getElementById('videoPlayer');
        const videoWrapper = document.getElementById('videoWrapper');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const centerPlayBtn = document.getElementById('centerPlayBtn');
        const progressBarWrapper = document.getElementById('progressBarWrapper');
        const progressFilled = document.getElementById('progressFilled');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const muteBtn = document.getElementById('muteBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        const muteIcon = document.getElementById('muteIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const speedSelect = document.getElementById('speedSelect');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIcon = document.getElementById('fullscreenIcon');
        const exitFullscreenIcon = document.getElementById('exitFullscreenIcon');

        // ============ 状态 ============
        let isDragging = false;
        let hideControlsTimeout = null;

        // ============ 工具函数 ============
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
            const sec = Math.floor(seconds);
            const mins = Math.floor(sec / 60);
            const remainingSecs = sec % 60;
            return `${mins}:${remainingSecs.toString().padStart(2, '0')}`;
        }

        function updatePlayIcon() {
            if (video.paused || video.ended) {
                playIcon.style.display = '';
                pauseIcon.style.display = 'none';
                centerPlayBtn.classList.add('visible');
            } else {
                playIcon.style.display = 'none';
                pauseIcon.style.display = '';
                centerPlayBtn.classList.remove('visible');
            }
        }

        function updateVolumeIcon() {
            if (video.muted || video.volume === 0) {
                volumeIcon.style.display = 'none';
                muteIcon.style.display = '';
            } else {
                volumeIcon.style.display = '';
                muteIcon.style.display = 'none';
            }
            volumeSlider.value = video.muted ? 0 : video.volume;
        }

        function updateFullscreenIcon() {
            const isFull = !!(
                document.fullscreenElement ||
                document.webkitFullscreenElement ||
                document.msFullscreenElement
            );
            fullscreenIcon.style.display = isFull ? 'none' : '';
            exitFullscreenIcon.style.display = isFull ? '' : 'none';
        }

        // ============ 视频事件 ============
        video.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(video.duration);
            updatePlayIcon();
            updateVolumeIcon();
        });

        video.addEventListener('timeupdate', () => {
            if (!isDragging && video.duration) {
                const percent = (video.currentTime / video.duration) * 100;
                progressFilled.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(video.currentTime);
            }
        });

        video.addEventListener('play', updatePlayIcon);
        video.addEventListener('pause', updatePlayIcon);
        video.addEventListener('ended', updatePlayIcon);
        video.addEventListener('volumechange', updateVolumeIcon);

        video.addEventListener('click', (e) => {
            e.stopPropagation();
            if (video.paused) {
                video.play().catch(() => {});
            } else {
                video.pause();
            }
        });

        // 双击全屏
        video.addEventListener('dblclick', (e) => {
            e.preventDefault();
            toggleFullscreen();
        });

        // ============ 播放/暂停按钮 ============
        playPauseBtn.addEventListener('click', () => {
            if (video.paused || video.ended) {
                video.play().catch(() => {});
            } else {
                video.pause();
            }
        });

        centerPlayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            video.play().catch(() => {});
        });

        // ============ 进度条 ============
        function getProgressPercent(event) {
            const rect = progressBarWrapper.getBoundingClientRect();
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            let percent = (clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            return percent;
        }

        function seekTo(event) {
            if (!video.duration) return;
            const percent = getProgressPercent(event);
            video.currentTime = percent * video.duration;
            progressFilled.style.width = (percent * 100) + '%';
            currentTimeEl.textContent = formatTime(video.currentTime);
        }

        progressBarWrapper.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isDragging = true;
            seekTo(e);
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                seekTo(e);
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // 触摸支持
        progressBarWrapper.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            seekTo(e);
        });

        document.addEventListener('touchmove', (e) => {
            if (isDragging) {
                seekTo(e);
            }
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // ============ 音量 ============
        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            if (!video.muted && video.volume === 0) {
                video.volume = 1;
            }
            updateVolumeIcon();
        });

        volumeSlider.addEventListener('input', () => {
            video.volume = parseFloat(volumeSlider.value);
            video.muted = (video.volume === 0);
            updateVolumeIcon();
        });

        // ============ 速度 ============
        speedSelect.addEventListener('change', () => {
            video.playbackRate = parseFloat(speedSelect.value);
        });

        // ============ 全屏 ============
        function toggleFullscreen() {
            const isFull = !!(
                document.fullscreenElement ||
                document.webkitFullscreenElement ||
                document.msFullscreenElement
            );

            if (!isFull) {
                const container = document.querySelector('.video-container');
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                } else if (container.msRequestFullscreen) {
                    container.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);

        document.addEventListener('fullscreenchange', updateFullscreenIcon);
        document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
        document.addEventListener('msfullscreenchange', updateFullscreenIcon);

        // ============ 键盘快捷键 ============
        document.addEventListener('keydown', (e) => {
            // 如果焦点在输入框里，不处理
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target
                .isContentEditable) {
                return;
            }

            switch (e.key.toLowerCase()) {
                case ' ':
                    e.preventDefault();
                    if (video.paused || video.ended) {
                        video.play().catch(() => {});
                    } else {
                        video.pause();
                    }
                    break;
                case 'arrowleft':
                    e.preventDefault();
                    video.currentTime = Math.max(0, video.currentTime - 5);
                    break;
                case 'arrowright':
                    e.preventDefault();
                    video.currentTime = Math.min(video.duration || Infinity, video.currentTime +
                    5);
                break;
                case 'arrowup':
                    e.preventDefault();
                    video.volume = Math.min(1, video.volume + 0.1);
                    video.muted = false;
                    updateVolumeIcon();
                    break;
                case 'arrowdown':
                    e.preventDefault();
                    video.volume = Math.max(0, video.volume - 0.1);
                    video.muted = (video.volume === 0);
                    updateVolumeIcon();
                    break;
                case 'm':
                    e.preventDefault();
                    video.muted = !video.muted;
                    if (!video.muted && video.volume === 0) video.volume = 1;
                    updateVolumeIcon();
                    break;
                case 'f':
                    e.preventDefault();
                    toggleFullscreen();
                    break;
                default:
                    break;
            }
        });

        // ============ 初始化 ============
        updatePlayIcon();
        updateVolumeIcon();
        updateFullscreenIcon();
        volumeSlider.value = video.volume;
        currentTimeEl.textContent = '0:00';
        durationEl.textContent = '0:00';

        console.log('🎬 视频播放器已就绪');
        console.log('   ⌨ 快捷键：空格=播放/暂停 ←→=快退/快进 ↑↓=音量 F=全屏 M=静音');
    })();
</script>
</body>
</html>
